<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GeoLook by Jock</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #333 url("./grungebg.jpg");
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 80px;
      margin: 20px 0 10px;
    }

    h2 {
      margin: 10px 0;
      color: aliceblue;
    }

    details {
      font-size: 14px;
      margin-bottom: 15px;
    }

    img {
        color: black;
      width: 28px;
      height: 28px;
      margin-bottom: 5px;
    }

    #controls {
      margin-bottom: 15px;
    }

    #address-input {
      width: 60%;
      max-width: 400px;
      padding: 10px;
      border: 2px solid #2196f3;
      border-radius: 6px;
      text-align: center;
      font-size: 16px;
      margin: 10px 0;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 75px;
    }

    button {
      background: white;
      border: 2px solid #2196f3;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      min-width: 120px;
    }

    button:hover {
      background: #2196f3;
    }

    #map {
      width: 98%;
      height: 600px;
      margin: 10px auto;
      border: 3px solid #2196f3;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    #transit-info {
      max-width: 600px;
      margin: 15px auto;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    .line {
      margin-bottom: 8px;
    }

    footer {
      margin-top: 15px;
      padding: 10px;
      font-size: 20px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>GeoLook</h1>
  <h2>Localisez-vous puis entrez une destination</h2>

  <details>
    <summary>Comment ça marche</summary>
    Cliquez sur "Me localiser", puis entrez votre destination pour obtenir un itinéraire.
  </details>

  <div id="controls">
    <button id="locate-button">
      <img src="location.png" alt="">
      <br>Me localiser
    </button>

    <br>

    <input id="address-input" type="text" placeholder="Entrez une adresse ou une destination">
  </div>

  <h2>Mode de transport</h2>

  <div class="buttons">
    <button id="route-button-car">
      <img src="car.png" alt=""><br>Voiture
    </button>

    <button id="route-button-transit">
      <img src="bus.png" alt=""><br>Transport
    </button>

    <button id="route-button-bike">
      <img src="bike.png" alt=""><br>Vélo
    </button>

    <button id="route-button-walk">
      <img src="walk.png" alt=""><br>À pied
    </button>
  </div>

  <div id="map"></div>

  <div id="transit-info"></div>

  <footer>
    © GeoLook by Jock – 2023
  </footer>

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBA4ONxjKbF_2UZoC4zkEoSVLnYbRH944g&callback=initMap" async defer></script>

  <!-- Ton script -->
  <script src="script.js"></script>

</body>
</html>
